<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Admin - Juninho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .table { color: #cbd5e1; }
        .btn-primary { background-color: #3b82f6; border: none; }
        .status-active { color: #22c55e; }
        .status-blocked { color: #ef4444; }
        input, select { background-color: #0f172a !important; border: 1px solid #334155 !important; color: white !important; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="bi bi-shield-lock-fill text-primary"></i> Painel de Licenças</h1>
            <form class="d-flex w-50" method="get" action="/admin">
                <input class="form-control me-2" type="search" name="search" placeholder="Buscar por Nome, CPF ou Chave..." value="{{ search }}">
                <button class="btn btn-outline-primary" type="submit">Buscar</button>
            </form>
        </div>

        <div class="row">
            <div class="col-lg-4">
                <div class="card p-4 mb-4">
                    <h4>Nova Licença</h4>
                    <form action="/admin/generate" method="post">
                        <input type="text" name="key" class="form-control mb-2" placeholder="CHAVE-EXEMPLO" required>
                        <input type="text" name="client_name" class="form-control mb-2" placeholder="Nome Completo" required>
                        <input type="text" name="document" class="form-control mb-2" placeholder="CPF ou CNPJ" required>
                        <input type="date" name="expires_at" class="form-control mb-3" required>
                        <button type="submit" class="btn btn-primary w-100">Criar Acesso</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card p-4">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th>Cliente / Doc</th>
                                <th>Vencimento</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for lic in licenses %}
                            <tr>
                                <td>
                                    <strong>{{ lic.client_name }}</strong><br>
                                    <small class="text-muted">{{ lic.document }} | {{ lic.key }}</small>
                                </td>
                                <td>
                                    <form action="/admin/extend/{{ lic.key }}" method="post" class="d-flex">
                                        <input type="date" name="new_date" value="{{ lic.expires_at }}" class="form-control form-control-sm me-1" style="width: 130px;">
                                        <button type="submit" class="btn btn-sm btn-outline-secondary"><i class="bi bi-save"></i></button>
                                    </form>
                                </td>
                                <td>
                                    <span class="{% if lic.status == 'active' %}status-active{% else %}status-blocked{% endif %}">
                                        {{ 'Ativo' if lic.status == 'active' else 'Bloqueado' }}
                                    </span>
                                </td>
                                <td>
                                    <form action="/admin/update-status/{{ lic.key }}" method="post">
                                        <input type="hidden" name="current_status" value="{{ lic.status }}">
                                        <button type="submit" class="btn btn-sm {% if lic.status == 'active' %}btn-danger{% else %}btn-success{% endif %}">
                                            {{ 'Bloquear' if lic.status == 'active' else 'Desbloquear' }}
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
