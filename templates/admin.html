<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Licenças SaaS</title>
    <style>
        body {
            background-color: #0f1115;
            color: #eaeaea;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .search-bar {
            display: flex;
            gap: 10px;
        }
        .search-bar input {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #2a3246;
            background-color: #151925;
            color: #fff;
            width: 300px;
        }
        .btn-blue {
            background-color: #2b6cff;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-blue:hover { background-color: #255fe0; }
        
        .main-content {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }
        .card {
            background-color: #1a1e2b;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #2a3246;
        }
        .form-panel {
            flex: 1;
            max-width: 350px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #2a3246;
            background-color: #151925;
            color: #fff;
            box-sizing: border-box;
        }
        .table-panel {
            flex: 2;
            width: 100%;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #2a3246;
        }
        th {
            color: #9aa4b2;
            font-weight: 600;
        }
        .status-active { color: #28a745; font-weight: bold; }
        .status-blocked { color: #dc3545; font-weight: bold; }
        .date-form { display: flex; gap: 5px; }
        .date-input {
            padding: 6px;
            border-radius: 6px;
            border: 1px solid #2a3246;
            background-color: #151925;
            color: #fff;
        }
        .btn-icon {
            background: transparent;
            border: 1px solid #2a3246;
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-icon:hover { background: #2a3246; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ Painel de Licenças</h1>
            <form class="search-bar" method="GET" action="/admin">
                <input type="text" name="search" placeholder="Buscar por Nome, CPF ou Chave..." value="{{ search }}">
                <button type="submit" class="btn-blue">Buscar</button>
            </form>
        </div>

        <div class="main-content">
            <div class="card form-panel">
                <h2 style="margin-top: 0; color: #4a5568;">Nova Licença</h2>
                <form action="/admin/generate" method="POST">
                    <div class="form-group">
                        <input type="text" name="key" placeholder="CHAVE-EXEMPLO" required>
                    </div>
                    <div class="form-group">
                        <input type="text" name="client_name" placeholder="Nome Completo" required>
                    </div>
                    <div class="form-group">
                        <input type="text" name="document" placeholder="CPF ou CNPJ" required>
                    </div>
                    <div class="form-group">
                        <input type="date" name="expires_at" required>
                    </div>
                    <button type="submit" class="btn-blue" style="width: 100%;">Criar Acesso</button>
                </form>
            </div>

            <div class="card table-panel">
                <table>
                    <thead>
                        <tr>
                            <th>Cliente / Doc</th>
                            <th>Vencimento</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for lic in licenses %}
                        <tr>
                            <td>
                                <strong style="color: #fff; font-size: 16px;">{{ lic['client_name'] }}</strong><br>
                                <span style="color: #9aa4b2; font-size: 12px;">{{ lic['document'] }} | {{ lic['key'] }}</span>
                            </td>
                            <td>
                                <form class="date-form" action="/admin/extend/{{ lic['key'] }}" method="POST">
                                    <input type="date" name="new_date" class="date-input" value="{{ lic['expires_at'] }}" required>
                                    <button type="submit" class="btn-icon" title="Atualizar Data">💾</button>
                                </form>
                            </td>
                            <td>
                                {% if lic['status'] == 'active' %}
                                    <span class="status-active">Ativo</span>
                                {% else %}
                                    <span class="status-blocked">Bloqueado</span>
                                {% endif %}
                            </td>
                            <td style="display: flex; gap: 8px; align-items: center;">
                                <form action="/admin/update-status/{{ lic['key'] }}" method="POST" style="margin: 0;">
                                    <input type="hidden" name="current_status" value="{{ lic['status'] }}">
                                    <button type="submit" style="background-color: {% if lic['status'] == 'active' %}#dc3545{% else %}#28a745{% endif %}; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold;">
                                        {% if lic['status'] == 'active' %}Bloquear{% else %}Desbloquear{% endif %}
                                    </button>
                                </form>
                                
                                <form action="/admin/delete/{{ lic['key'] }}" method="POST" style="margin: 0;" onsubmit="return confirm('ATENÇÃO: Tem certeza que deseja APAGAR DEFINITIVAMENTE a licença de {{ lic['client_name'] }}?');">
                                    <button type="submit" style="background-color: transparent; border: 1px solid #dc3545; color: #dc3545; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 14px;" title="Excluir Licença">
                                        🗑️
                                    </button>
                                </form>
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="4" style="text-align: center; color: #9aa4b2; padding: 30px;">
                                Nenhuma licença encontrada.
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
